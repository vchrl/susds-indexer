services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: susds
      POSTGRES_PASSWORD: susds
      POSTGRES_DB: susds
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U susds -d susds"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  pgdata:
